name: Add to Project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        uses: alex-page/github-project-automation-plus@v0.8.1
        with:
          project-url: https://github.com/orgs/openzirndorf/projects/2
          github-token: ${{ secrets.PROJECT_TOKEN }}